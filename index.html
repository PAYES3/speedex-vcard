<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Business Card</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap');
    body { font-family: 'Montserrat', sans-serif; }
    #card-qr-box img, #card-qr-box canvas { width: 220px !important; height: 220px !important; }
  </style>
</head>
<body class="bg-slate-200 min-h-screen flex justify-center items-start sm:py-6">

  <div id="digital-card" class="w-full max-w-md bg-[#F3F4F6] min-h-screen sm:min-h-0 sm:rounded-[32px] shadow-2xl overflow-hidden relative">

    <!-- Header Dynamic Logo -->
    <div class="bg-white py-5 px-4 text-center border-b border-slate-100">
      <img id="card-header-logo" src="logo.png" alt="Company Logo" class="h-12 mx-auto object-contain">
    </div>

    <!-- Profile Header -->
    <div class="bg-[#6B3020] text-white text-center pt-10 pb-10 px-4 relative">
      <div class="absolute -top-8 left-1/2 -translate-x-1/2">
        <div id="emp-avatar" class="w-20 h-20 rounded-full bg-[#404348] border-4 border-white flex items-center justify-center text-white text-xl font-extrabold shadow-md overflow-hidden">
          --
        </div>
      </div>

      <h1 id="emp-name" class="text-xl font-extrabold tracking-tight mt-4">Loading...</h1>
      <p id="emp-desig" class="text-[11px] font-medium text-slate-200 mt-0.5">---</p>
      
      <div class="w-7 h-[1.5px] bg-white/30 mx-auto my-2"></div>
      
      <p id="emp-company" class="text-[9px] font-bold tracking-widest text-white/90 uppercase">SPEEDEX AUTO WORKSHOP LLC</p>
      <div class="absolute bottom-0 left-0 right-0 h-3 bg-[#3D5D69]" style="clip-path: polygon(0 100%, 100% 0, 100% 100%);"></div>
    </div>

    <!-- Navigation Tabs -->
    <div class="px-4 -mt-5 relative z-10">
      <div class="bg-[#6B3020] rounded-2xl p-1 flex justify-between items-center text-white text-[9px] font-bold shadow-lg">
        <button id="tab-btn-qr" onclick="switchTab('qr')" class="tab-btn flex-1 py-2.5 rounded-xl flex flex-col items-center gap-1 transition opacity-80 hover:opacity-100">
          <i class="fa-solid fa-qrcode text-xs"></i>
          <span>QR CODE</span>
        </button>
        <button id="tab-btn-location" onclick="switchTab('location')" class="tab-btn flex-1 py-2.5 rounded-xl flex flex-col items-center gap-1 transition opacity-80 hover:opacity-100">
          <i class="fa-solid fa-location-dot text-xs"></i>
          <span>LOCATION</span>
        </button>
        <button id="tab-btn-contact" onclick="switchTab('contact')" class="tab-btn flex-1 py-2.5 bg-white text-[#6B3020] rounded-xl flex flex-col items-center gap-1 shadow-md transition font-bold">
          <i class="fa-solid fa-id-card text-xs"></i>
          <span>CONTACT</span>
        </button>
        <button id="tab-btn-enquiry" onclick="switchTab('enquiry')" class="tab-btn flex-1 py-2.5 rounded-xl flex flex-col items-center gap-1 transition opacity-80 hover:opacity-100">
          <i class="fa-solid fa-circle-question text-xs"></i>
          <span>ENQUIRY</span>
        </button>
      </div>
    </div>

    <!-- TAB 1: QR CODE -->
    <div id="content-qr" class="tab-content hidden p-5 text-center">
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center">
        <h2 class="font-bold text-slate-800 text-sm mb-1">Scan Digital Card</h2>
        <p class="text-[10px] text-slate-400 mb-4">Share this QR Code to open profile</p>
        
        <div id="card-qr-wrapper" class="p-3 bg-white border border-slate-200 rounded-2xl shadow-inner flex items-center justify-center">
          <div class="relative inline-block">
            <div id="card-qr-box" class="flex items-center justify-center"></div>
            <!-- Dynamic Center Logo Overlay -->
            <div id="card-center-logo-box" class="hidden absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white p-1 rounded-md border border-slate-300 shadow-md flex items-center justify-center max-w-[100px] max-h-[40px]">
              <img id="card-center-logo" src="logo.png" alt="Logo" class="max-w-[85px] max-h-[28px] object-contain pointer-events-none">
            </div>
          </div>
        </div>

        <button onclick="downloadCardQrCodeWithHDLogo()" class="mt-4 bg-[#6B3020] hover:bg-[#522418] text-white font-bold py-2 px-4 rounded-xl text-xs flex items-center justify-center gap-2 shadow transition">
          <i class="fa-solid fa-download"></i>
          <span>Download High-Res QR Code</span>
        </button>

        <p id="qr-emp-name" class="font-bold text-slate-800 text-xs mt-3"></p>
        <p id="qr-emp-desig" class="text-[10px] text-[#6B3020] font-semibold"></p>
      </div>
    </div>

    <!-- TAB 2: LOCATION -->
    <div id="content-location" class="tab-content hidden p-5">
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 text-center">
        <h2 class="font-bold text-slate-800 text-sm mb-1">Our Location</h2>
        <p id="loc-display-address" class="text-[11px] text-slate-500 mb-4">Musaffah - M38 - Abu Dhabi</p>
        <a id="gmap-btn" href="https://maps.google.com/?q=Speedex+Auto+Workshop+Musaffah+M38+Abu+Dhabi" target="_blank" class="w-full bg-[#3D5D69] hover:bg-[#2e4751] text-white font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2 shadow transition text-xs">
          <i class="fa-solid fa-diamond-turn-right"></i>
          <span>Open in Google Maps</span>
        </a>
      </div>
    </div>

    <!-- TAB 3: CONTACT -->
    <div id="content-contact" class="tab-content p-5">
      <h2 class="text-center font-extrabold text-slate-800 text-xs mb-4 tracking-wider uppercase">Get In Touch</h2>
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden divide-y divide-slate-100">
        <div class="p-3.5 flex items-center gap-3">
          <div class="w-9 h-9 rounded-full bg-[#6B3020] text-white flex items-center justify-center shrink-0"><i class="fa-solid fa-phone text-xs"></i></div>
          <div>
            <p class="text-[8px] font-bold text-slate-400 uppercase">MOBILE</p>
            <a id="emp-phone" href="#" class="text-xs font-bold text-slate-800">-</a>
          </div>
        </div>
        <div class="p-3.5 flex items-center gap-3">
          <div class="w-9 h-9 rounded-full bg-[#6B3020] text-white flex items-center justify-center shrink-0"><i class="fa-solid fa-envelope text-xs"></i></div>
          <div>
            <p class="text-[8px] font-bold text-slate-400 uppercase">EMAIL</p>
            <a id="emp-email" href="#" class="text-xs font-bold text-slate-800">-</a>
          </div>
        </div>
        <div class="p-3.5 flex items-center gap-3">
          <div class="w-9 h-9 rounded-full bg-[#3D5D69] text-white flex items-center justify-center shrink-0"><i class="fa-solid fa-globe text-xs"></i></div>
          <div>
            <p class="text-[8px] font-bold text-slate-400 uppercase">WEBSITE</p>
            <a id="emp-website" href="#" target="_blank" class="text-xs font-bold text-slate-800">-</a>
          </div>
        </div>
      </div>

      <div class="mt-6 space-y-3">
        <button onclick="downloadCardAsImage()" class="w-full bg-[#6B3020] hover:bg-[#522418] text-white font-bold py-3.5 px-4 rounded-xl flex items-center justify-center gap-2 shadow-md transition text-xs">
          <i class="fa-solid fa-image"></i>
          <span>Download Digital Card (Image)</span>
        </button>

        <button onclick="downloadBrochureFile()" class="w-full bg-[#3D5D69] hover:bg-[#2e4751] text-white font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2 shadow-md transition text-xs">
          <i class="fa-solid fa-file-pdf"></i>
          <span id="brochure-btn-text">Download Company Brochure</span>
        </button>

        <a id="vcf-btn" href="#" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-2.5 px-4 rounded-xl flex items-center justify-center gap-2 shadow-sm transition text-[11px]">
          <i class="fa-solid fa-address-card"></i>
          <span>Save Contact to Phone (vCard)</span>
        </a>
      </div>
    </div>

    <!-- TAB 4: ENQUIRY -->
    <div id="content-enquiry" class="tab-content hidden p-5">
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
        <h2 class="text-center font-bold text-slate-800 text-sm mb-1">Send An Enquiry</h2>
        <form onsubmit="handleEnquirySubmit(event)" class="space-y-3 mt-3">
          <input type="text" id="enq-name" required placeholder="Your Name" class="w-full border p-2.5 rounded-xl text-xs">
          <input type="tel" id="enq-phone" required placeholder="Phone Number" class="w-full border p-2.5 rounded-xl text-xs">
          <textarea id="enq-msg" rows="3" required placeholder="Message" class="w-full border p-2.5 rounded-xl text-xs"></textarea>
          <button type="submit" class="w-full bg-[#6B3020] text-white font-bold py-3 rounded-xl text-xs flex justify-center items-center gap-2">
            <i class="fa-brands fa-whatsapp"></i> Send via WhatsApp
          </button>
        </form>
      </div>
    </div>

    <!-- Footer -->
    <div class="bg-[#181A1E] text-white text-center py-5 px-4">
      <div class="flex justify-center items-center gap-4 mb-3">
        <a id="social-insta" href="https://instagram.com" target="_blank" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center hover:bg-[#6B3020] transition text-white text-sm">
          <i class="fa-brands fa-instagram"></i>
        </a>
        <a id="social-youtube" href="https://youtube.com" target="_blank" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center hover:bg-[#6B3020] transition text-white text-sm">
          <i class="fa-brands fa-youtube"></i>
        </a>
        <a id="social-linkedin" href="https://linkedin.com" target="_blank" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center hover:bg-[#6B3020] transition text-white text-sm">
          <i class="fa-brands fa-linkedin-in"></i>
        </a>
      </div>
      <p id="footer-company-name" class="text-[9px] font-bold text-slate-400 tracking-wider uppercase">SPEEDEX AUTO WORKSHOP LLC</p>
    </div>

  </div>

  <script>
    const SUPABASE_URL = "https://coejwpuctpkymcvzqzwh.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_zxzYhq0Af8HAe4T4k8cpCw_uuC8F79d";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const companyLogoMap = {
      "1. Speedex Auto Workshop LLC": "logo.png",
      "2. Arabsat Transport Passengers by Buses": "arabsat-logo.jpg",
      "3. Excellent General Trading": "excellent-gt-logo.jpg",
      "4. Speedex Signages": "signages-logo.jpg",
      "5. Speedex Cars Rental": "cars-rental-logo.jpg",
      "6. Excellent Field Contracting": "field-contracting-logo.jpg",
      "7. Speedex Facility Management": "facility-management-logo.jpg",
      "8. Excellent Group of Companies": "excellent-group-logo.jpg"
    };

    let activeEmp = null;

    async function loadCardData() {
      const urlParams = new URLSearchParams(window.location.search);
      const empId = urlParams.get('id');

      let data = null;

      if (empId) {
        const res = await _supabase.from('employees').select('*').eq('id', empId).single();
        data = res.data;
      }

      if (!data) {
        const res = await _supabase.from('employees').select('*').order('created_at', { ascending: false }).limit(1).single();
        data = res.data;
      }

      if (!data) {
        document.getElementById('emp-name').innerText = "No Data Found";
        return;
      }

      activeEmp = data;

      const compName = data.company || "1. Speedex Auto Workshop LLC";
      const cleanCompName = compName.replace(/^\d+\.\s*/, '');

      document.getElementById('emp-company').innerText = cleanCompName;
      document.getElementById('footer-company-name').innerText = cleanCompName;

      const currentLogo = companyLogoMap[compName] || "logo.png";
      document.getElementById('card-header-logo').src = currentLogo;
      document.getElementById('card-center-logo').src = currentLogo;

      const avatarBox = document.getElementById('emp-avatar');
      const initials = data.name ? data.name.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase() : "EX";

      if (data.photo_url) {
        avatarBox.innerHTML = `<img src="${data.photo_url}" alt="${data.name}" class="w-full h-full object-cover rounded-full" crossorigin="anonymous" onerror="this.onerror=null; this.parentElement.innerText='${initials}';">`;
      } else {
        avatarBox.innerText = initials;
      }

      document.getElementById('emp-name').innerText = data.name || "Employee Name";
      document.getElementById('emp-desig').innerText = data.desig || "Designation";
      document.getElementById('qr-emp-name').innerText = data.name || "";
      document.getElementById('qr-emp-desig').innerText = data.desig || "";

      document.getElementById('emp-phone').innerText = data.phone || "-";
      document.getElementById('emp-phone').href = `tel:${data.phone}`;
      document.getElementById('emp-email').innerText = data.email || "-";
      document.getElementById('emp-email').href = `mailto:${data.email}`;
      document.getElementById('loc-display-address').innerText = data.loc || "Musaffah - M38 - Abu Dhabi";
      
      // Default Speedex Auto Workshop Map Link Fallback
      document.getElementById('gmap-btn').href = data.map_url || "https://maps.google.com/?q=Speedex+Auto+Workshop+Musaffah+M38+Abu+Dhabi";

      document.getElementById('emp-website').innerText = data.website || "www.speedexgroups.ae";
      document.getElementById('emp-website').href = data.website?.startsWith('http') ? data.website : `https://${data.website}`;

      const vcfData = `BEGIN:VCARD\nVERSION:3.0\nN:;${data.name};;;\nFN:${data.name}\nORG:${cleanCompName}\nTITLE:${data.desig}\nTEL;TYPE=CELL:${data.phone}\nEMAIL:${data.email}\nEND:VCARD`;
      const blob = new Blob([vcfData], { type: 'text/vcard' });
      document.getElementById('vcf-btn').href = URL.createObjectURL(blob);
      document.getElementById('vcf-btn').download = `${(data.name || 'contact').replace(/\s+/g, '_')}.vcf`;
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.getElementById(`content-${tab}`).classList.remove('hidden');

      const tabList = ['qr', 'location', 'contact', 'enquiry'];
      tabList.forEach(t => {
        const btn = document.getElementById(`tab-btn-${t}`);
        if (btn) {
          if (t === tab) {
            btn.className = "tab-btn flex-1 py-2.5 bg-white text-[#6B3020] rounded-xl flex flex-col items-center gap-1 shadow-md transition font-bold";
          } else {
            btn.className = "tab-btn flex-1 py-2.5 rounded-xl flex flex-col items-center gap-1 transition opacity-80 hover:opacity-100 text-white";
          }
        }
      });

      if(tab === 'qr') {
        const qrBox = document.getElementById('card-qr-box');
        qrBox.innerHTML = "";

        new QRCode(qrBox, {
          text: window.location.href,
          width: 220,
          height: 220,
          colorDark: "#181A1E",
          colorLight: "#FFFFFF",
          correctLevel: QRCode.CorrectLevel.H
        });

        document.getElementById('card-center-logo-box').classList.remove('hidden');
      }
    }

    // High Clarity HD Ultra-Clear Download Function
    function downloadCardQrCodeWithHDLogo() {
      const qrCanvas = document.querySelector('#card-qr-box canvas');
      const logoImg = document.getElementById('card-center-logo');

      if (!qrCanvas) return alert("QR Code not ready!");

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      const size = 2400; // High Resolution
      canvas.width = size;
      canvas.height = size;

      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';

      // Draw QR Code
      ctx.drawImage(qrCanvas, 0, 0, size, size);

      // Draw Center White Box
      const logoWidth = size * 0.35;
      const logoHeight = size * 0.16;
      const x = (size - logoWidth) / 2;
      const y = (size - logoHeight) / 2;

      ctx.fillStyle = "#FFFFFF";
      ctx.fillRect(x - 20, y - 20, logoWidth + 40, logoHeight + 40);

      ctx.strokeStyle = "#CBD5E1";
      ctx.lineWidth = 12;
      ctx.strokeRect(x - 20, y - 20, logoWidth + 40, logoHeight + 40);

      // Draw HD Logo Image
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.src = logoImg.src;

      img.onload = function () {
        ctx.drawImage(img, x, y, logoWidth, logoHeight);

        const filename = activeEmp ? `${activeEmp.name.replace(/\s+/g, '_')}_HD_QR.png` : 'Digital_Card_HD_QR.png';
        const link = document.createElement('a');
        link.download = filename;
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
      };
    }

    function downloadCardAsImage() {
      const cardElement = document.getElementById('digital-card');
      const filename = activeEmp ? `${activeEmp.name.replace(/\s+/g, '_')}_Card.png` : 'Digital_Card.png';
      
      html2canvas(cardElement, { scale: 3, useCORS: true }).then(canvas => {
        const link = document.createElement('a');
        link.download = filename;
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    }

    function downloadBrochureFile() {
      const fileUrl = activeEmp?.brochure || 'speedex-brochure.pdf';
      const link = document.createElement('a');
      link.href = fileUrl;
      link.download = fileUrl.split('/').pop();
      link.target = '_blank';
      link.click();
    }

    function handleEnquirySubmit(e) {
      e.preventDefault();
      if(!activeEmp) return;
      const cName = document.getElementById('enq-name').value;
      const cPhone = document.getElementById('enq-phone').value;
      const cMsg = document.getElementById('enq-msg').value;

      const textMessage = `Hello ${activeEmp.name},\nEnquiry regarding ${activeEmp.company || ''}:\nName: ${cName}\nPhone: ${cPhone}\nMsg: ${cMsg}`;
      const cleanPhone = activeEmp.phone.replace(/[^0-9]/g, '');
      window.open(`https://wa.me/${cleanPhone}?text=${encodeURIComponent(textMessage)}`, '_blank');
    }

    window.onload = loadCardData;
  </script>
</body>
</html>
