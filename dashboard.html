<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speedex Card Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap');
    body { font-family: 'Montserrat', sans-serif; }
    #qr-box img, #qr-box canvas { width: 220px !important; height: 220px !important; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 sm:p-8">

  <div class="max-w-6xl mx-auto space-y-6">
    
    <!-- Top Header -->
    <div class="bg-[#181A1E] text-white p-6 rounded-2xl flex justify-between items-center shadow-lg">
      <div>
        <h1 class="text-2xl font-extrabold tracking-tight">Speedex Card Dashboard</h1>
        <p class="text-xs text-slate-400 mt-1">Multi-Company Dynamic Brochure & Custom Logo QR</p>
      </div>
      <span class="bg-[#6B3020] px-4 py-1.5 rounded-lg text-xs font-bold tracking-wider uppercase">ADMIN PANEL</span>
    </div>

    <!-- Main Content Layout -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">

      <!-- Left Form Section -->
      <div class="lg:col-span-7 bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-5">
        <h2 class="text-sm font-bold text-slate-800 uppercase tracking-wider border-b pb-3">EMPLOYEE & COMPANY DETAILS</h2>

        <form id="card-form" onsubmit="handleSaveAndGenerate(event)" class="space-y-4">
          
          <div>
            <label class="block text-xs font-bold text-slate-700 mb-1">Select Company *</label>
            <select id="company-select" onchange="updateCompanyLogoPreview()" required class="w-full border border-slate-300 rounded-xl p-3 text-xs bg-slate-50 focus:bg-white focus:ring-2 focus:ring-[#6B3020] outline-none font-medium">
              <option value="1. Speedex Auto Workshop LLC">1. Speedex Auto Workshop LLC</option>
              <option value="2. Arabsat Transport Passengers by Buses">2. Arabsat Transport Passengers by Buses</option>
              <option value="3. Excellent General Trading">3. Excellent General Trading</option>
              <option value="4. Speedex Signages">4. Speedex Signages</option>
              <option value="5. Speedex Cars Rental">5. Speedex Cars Rental</option>
              <option value="6. Excellent Field Contracting">6. Excellent Field Contracting</option>
              <option value="7. Speedex Facility Management">7. Speedex Facility Management</option>
              <option value="8. Excellent Group of Companies">8. Excellent Group of Companies</option>
            </select>
          </div>

          <div>
            <label class="block text-xs font-bold text-slate-700 mb-1">Vercel Domain Base URL</label>
            <input type="url" id="base-url" required value="https://speedex-vcard.vercel.app/index.html" class="w-full border border-slate-300 rounded-xl p-3 text-xs bg-slate-50 focus:bg-white outline-none">
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-bold text-slate-700 mb-1">Full Name *</label>
              <input type="text" id="emp-name-input" required placeholder="askar" class="w-full border border-slate-300 rounded-xl p-3 text-xs focus:ring-2 focus:ring-[#6B3020] outline-none">
            </div>
            <div>
              <label class="block text-xs font-bold text-slate-700 mb-1">Designation *</label>
              <input type="text" id="emp-desig-input" required placeholder="purchaser" class="w-full border border-slate-300 rounded-xl p-3 text-xs focus:ring-2 focus:ring-[#6B3020] outline-none">
            </div>
          </div>

          <!-- Photo Input -->
          <div class="border border-slate-200 rounded-xl p-4 bg-slate-50 space-y-3">
            <label class="block text-xs font-bold text-slate-700">Profile Photo (PC Upload OR Link)</label>
            <input type="file" id="photo-file" accept="image/*" class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-semibold file:bg-[#6B3020] file:text-white hover:file:bg-[#522418]">
            <p class="text-center text-[10px] text-slate-400 font-bold">--- OR ---</p>
            <input type="url" id="photo-url" placeholder="Direct Photo Link (Optional)" class="w-full border border-slate-300 rounded-xl p-2.5 text-xs bg-white">
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-bold text-slate-700 mb-1">Phone Number *</label>
              <input type="text" id="emp-phone-input" required placeholder="+971 556548325" class="w-full border border-slate-300 rounded-xl p-3 text-xs focus:ring-2 focus:ring-[#6B3020] outline-none">
            </div>
            <div>
              <label class="block text-xs font-bold text-slate-700 mb-1">Email Address *</label>
              <input type="email" id="emp-email-input" required placeholder="purchaser@excellenttrading.ae" class="w-full border border-slate-300 rounded-xl p-3 text-xs focus:ring-2 focus:ring-[#6B3020] outline-none">
            </div>
          </div>

          <div>
            <label class="block text-xs font-bold text-slate-700 mb-1">Office Address</label>
            <input type="text" id="emp-loc-input" value="Musaffah - M38 - Abu Dhabi" class="w-full border border-slate-300 rounded-xl p-3 text-xs focus:ring-2 focus:ring-[#6B3020] outline-none">
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-bold text-slate-700 mb-1">Google Maps Link</label>
              <input type="url" id="emp-map-input" value="https://maps.google.com/?q=Speedex+Auto+Workshop+Musaffah+M38+Abu+Dhabi" class="w-full border border-slate-300 rounded-xl p-3 text-xs focus:ring-2 focus:ring-[#6B3020] outline-none">
            </div>
            <div>
              <label class="block text-xs font-bold text-slate-700 mb-1">Website</label>
              <input type="text" id="emp-web-input" value="www.speedexgroups.ae" class="w-full border border-slate-300 rounded-xl p-3 text-xs focus:ring-2 focus:ring-[#6B3020] outline-none">
            </div>
          </div>

          <button type="submit" id="save-btn" class="w-full bg-[#6B3020] hover:bg-[#522418] text-white font-bold py-3.5 px-4 rounded-xl text-xs flex items-center justify-center gap-2 shadow-md transition">
            <i class="fa-solid fa-cloud-arrow-up"></i>
            <span>Save to Supabase & Generate QR</span>
          </button>

        </form>
      </div>

      <!-- Right Preview & QR Section -->
      <div class="lg:col-span-5 bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col items-center text-center justify-between">
        <div class="w-full">
          <h2 class="text-sm font-bold text-slate-800 uppercase tracking-wider border-b pb-3 mb-6">GENERATED QR (COMPANY CENTER LOGO)</h2>

          <!-- QR Wrapper -->
          <div class="inline-block p-4 bg-white border border-slate-200 rounded-2xl shadow-inner relative">
            <div id="qr-box" class="flex justify-center items-center"></div>
            
            <!-- Dynamic Center Logo -->
            <div id="qr-center-logo-box" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white p-1 rounded-md border border-slate-300 shadow-md flex items-center justify-center max-w-[90px] max-h-[38px]">
              <img id="qr-center-logo" src="logo.png" alt="Company Logo" class="max-w-[80px] max-h-[26px] object-contain">
            </div>
          </div>

          <!-- Live Card Link -->
          <div class="mt-6 text-left w-full">
            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">LIVE SUPABASE CARD LINK</label>
            <input type="text" id="generated-url" readonly placeholder="Save data to generate live URL" class="w-full border border-slate-200 bg-slate-50 text-slate-600 rounded-xl p-3 text-xs font-mono select-all">
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="w-full space-y-2 mt-6">
          <button onclick="downloadQRWithHDLogo()" class="w-full bg-[#6B3020] hover:bg-[#522418] text-white font-bold py-3 rounded-xl text-xs flex items-center justify-center gap-2 transition">
            <i class="fa-solid fa-download"></i> Download High-Res QR Code Image
          </button>
          <button onclick="copyCardLink()" class="w-full bg-slate-700 hover:bg-slate-800 text-white font-bold py-3 rounded-xl text-xs flex items-center justify-center gap-2 transition">
            <i class="fa-solid fa-copy"></i> Copy Card Link
          </button>
          <a id="open-card-btn" href="#" target="_blank" class="w-full bg-[#181A1E] hover:bg-black text-white font-bold py-3 rounded-xl text-xs flex items-center justify-center gap-2 transition block">
            <i class="fa-solid fa-arrow-up-right-from-square"></i> Open Saved Card Page
          </a>
        </div>

      </div>

    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://coejwpuctpkymcvzqzwh.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_zxzYhq0Af8HAe4T4k8cpCw_uuC8F79d";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const companyLogoMap = {
      "1. Speedex Auto Workshop LLC": "logo.png",
      "2. Arabsat Transport Passengers by Buses": "arabsat-logo.jpg",
      "3. Excellent General Trading": "excellent-gt-logo.jpg",
      "4. Speedex Signages": "signages-logo.jpg",
      "5. Speedex Cars Rental": "cars-rental-logo.jpg",
      "6. Excellent Field Contracting": "field-contracting-logo.jpg",
      "7. Speedex Facility Management": "facility-management-logo.jpg",
      "8. Excellent Group of Companies": "excellent-group-logo.jpg"
    };

    function updateCompanyLogoPreview() {
      const selectedComp = document.getElementById('company-select').value;
      const logoPath = companyLogoMap[selectedComp] || "logo.png";
      document.getElementById('qr-center-logo').src = logoPath;
    }

    function generatePreviewQR(url) {
      const qrBox = document.getElementById('qr-box');
      qrBox.innerHTML = "";
      new QRCode(qrBox, {
        text: url || "https://speedex-vcard.vercel.app/index.html",
        width: 220,
        height: 220,
        colorDark: "#181A1E",
        colorLight: "#FFFFFF",
        correctLevel: QRCode.CorrectLevel.H
      });
    }

    async function handleSaveAndGenerate(e) {
      e.preventDefault();
      const btn = document.getElementById('save-btn');
      btn.innerText = "Saving to Supabase...";
      btn.disabled = true;

      try {
        let photoUrl = document.getElementById('photo-url').value;
        const fileInput = document.getElementById('photo-file');

        if (fileInput.files.length > 0) {
          const file = fileInput.files[0];
          const fileExt = file.name.split('.').pop();
          const fileName = `${Date.now()}.${fileExt}`;
          
          const { data: uploadData, error: uploadErr } = await _supabase.storage.from('avatars').upload(fileName, file);
          if (uploadErr) throw uploadErr;
          
          const { data: publicUrlData } = _supabase.storage.from('avatars').getPublicUrl(fileName);
          photoUrl = publicUrlData.publicUrl;
        }

        const payload = {
          company: document.getElementById('company-select').value,
          name: document.getElementById('emp-name-input').value,
          desig: document.getElementById('emp-desig-input').value,
          phone: document.getElementById('emp-phone-input').value,
          email: document.getElementById('emp-email-input').value,
          loc: document.getElementById('emp-loc-input').value,
          map_url: document.getElementById('emp-map-input').value,
          website: document.getElementById('emp-web-input').value,
          photo_url: photoUrl
        };

        const { data, error } = await _supabase.from('employees').insert([payload]).select().single();
        if (error) throw error;

        const baseUrl = document.getElementById('base-url').value;
        const cardUrl = `${baseUrl}?id=${data.id}`;

        document.getElementById('generated-url').value = cardUrl;
        document.getElementById('open-card-btn').href = cardUrl;

        generatePreviewQR(cardUrl);
        updateCompanyLogoPreview();
        alert("Employee Saved Successfully!");

      } catch (err) {
        alert("Error saving data: " + err.message);
      } finally {
        btn.innerText = "Save to Supabase & Generate QR";
        btn.disabled = false;
      }
    }

    // High Resolution HD Clear Download
    function downloadQRWithHDLogo() {
      const qrCanvas = document.querySelector('#qr-box canvas');
      const logoImg = document.getElementById('qr-center-logo');

      if (!qrCanvas) return alert("Generate QR first!");

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      const size = 2400; // Ultra HD Canvas
      canvas.width = size;
      canvas.height = size;

      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';

      // 1. Draw QR Code
      ctx.drawImage(qrCanvas, 0, 0, size, size);

      // 2. Draw White Center Box
      const logoWidth = size * 0.35;
      const logoHeight = size * 0.16;
      const x = (size - logoWidth) / 2;
      const y = (size - logoHeight) / 2;

      ctx.fillStyle = "#FFFFFF";
      ctx.fillRect(x - 20, y - 20, logoWidth + 40, logoHeight + 40);

      ctx.strokeStyle = "#CBD5E1";
      ctx.lineWidth = 12;
      ctx.strokeRect(x - 20, y - 20, logoWidth + 40, logoHeight + 40);

      // 3. Render High Quality Logo
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.src = logoImg.src;

      img.onload = function () {
        ctx.drawImage(img, x, y, logoWidth, logoHeight);

        const link = document.createElement('a');
        link.download = 'Speedex_HD_QR_Code.png';
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
      };
    }

    function copyCardLink() {
      const urlInput = document.getElementById('generated-url');
      if (!urlInput.value) return alert("No link generated yet!");
      urlInput.select();
      navigator.clipboard.writeText(urlInput.value);
      alert("Card link copied to clipboard!");
    }

    window.onload = function() {
      generatePreviewQR("https://speedex-vcard.vercel.app/index.html");
      updateCompanyLogoPreview();
    };
  </script>
</body>
</html>
